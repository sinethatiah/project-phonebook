<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Stores</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
    <script defer src="stores.js"></script>
  </head>
  <body class="bg-[#CAE5FF] min-h-screen flex flex-col">
     <header>
      <nav class="flex justify-between items-center bg-[#6699CC] px-6 py-4 mx-4 mt-4 rounded-2xl shadow-md sticky top-4 z-50">
        <div class="w-10 h-10">
          <a href="index.html">
            <img src="images/phone-logo.avif" alt="logo" class="rounded-xl w-full h-full object-cover" />
          </a>
        </div>
 
        <div class="flex items-center gap-6">
          <a href="main.html" class="text-white/80 hover:text-white font-semibold text-sm transition">
            <span class="hidden md:block">Home</span>
            <span class="material-symbols-outlined md:hidden text-xl">home</span>
          </a>
          <a href="favorites.html" class="text-white/80 hover:text-white font-semibold text-sm transition">
            <span class="hidden md:block">Favorites</span>
            <span class="material-symbols-outlined md:hidden text-xl">favorite</span>
          </a>
          <a href="login.html">
            <button class="bg-white text-[#5577AA] px-5 py-2 rounded-full font-bold text-sm hover:bg-[#dceeff] transition">
              Login
            </button>
          </a>
        </div>
      </nav>
    </header>
    <main class="flex-1 p-5">
      <div class="flex justify-center items-center h-full">
        <form action="submit" class="rounded-full">
          <input type="text" placeholder="Search..." class="p-2" />
          <button
            type="submit"
            class="bg-[#6699CC] text-white p-2 rounded-md hover:bg-[#5577AA] transition duration-300"
          >
            Search
          </button>
        </form>
      </div>
      <div id="stores-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-4"></div>
    </main>
    <footer class="mt-auto w-full">
      <div class="justify-center text-center font-medium">
        <p>
          contacts us at
          <a
            href="mailto:info@phonebook.com"
            class="text-blue-500 hover:underline"
            >info@phonebook.com</a
          >
          or call us at
          <a href="tel:+254768023626" class="text-blue-500 hover:underline"
            >+254 768 023 626</a
          >
        </p>
      </div>
      <div class="text-center p-4 bg-[#6699CC] text-white mt-10 rounded-lg">
        &copy; @2026 Phonebook. All rights reserved.
      </div>
    </footer>
  </body>
</html>

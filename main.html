<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body class="m-5 bg-[#CAE5FF]">
    <header>
      <nav
        class="flex justify-between items-center bg-[#6699CC] p-5 sticky m-5"
      >
        <div>
          <span class="hidden md:block lg:block">Home</span
          ><span class="material-symbols-outlined md:hidden lg:hidden">
            home
          </span>
        </div>
        <div>
          <span class="material-symbols-outlined md:hidden lg:hidden">
            favorite
          </span>
          <span class="hidden md:block lg:block"
            >Favorites <a href="Favorites.html"></a
          ></span>
        </div>
        <div>
          <button
            class="bg-[#DCDCDC] text-black px-4 py-2 rounded-full hover:bg-[#5577AA] transition duration-300"
          >
            login
          </button>
        </div>
      </nav>
    </header>
    <main>
      <div class="flex justify-center items-center h-full">
        <form action="submit" class="rounded-full">
          <input type="text" placeholder="Search..." />
          <button
            type="submit"
            class="bg-[#6699CC] text-white p-2 rounded-md hover:bg-[#5577AA] transition duration-300"
          >
            Search
          </button>
        </form>
      </div>
      <div class="flex flex-wrap">
        <div
          class="relative bg-white m-5 p-5 rounded-md hover:bg-[#DCDCDC] transition duration-300 hover:scale-105 hover:shadow-lg hover:cursor-pointer "
        >
          Services
        </div>
        <div
          class="relative bg-white m-5 p-5 rounded-md hover:bg-[#DCDCDC] transition duration-300 hover:scale-105 hover:shadow-lg hover:cursor-pointer "
        >
          Stores
        </div>
        <div
          class="relative bg-white m-5 p-5 rounded-md hover:bg-[#DCDCDC] transition duration-300 hover:scale-105 hover:shadow-lg hover:cursor-pointer "
        >
          Emergencies
        </div>
        <div
          class="relative bg-white m-5 p-5 rounded-md hover:bg-[#DCDCDC] transition duration-300 hover:scale-105 hover:shadow-lg hover:cursor-pointer "
        >
          Jobs
        </div>
      </div>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Services</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
    <script defer src="services.js"></script>
  </head>
  <body class="bg-[#CAE5FF] min-h-screen flex flex-col">
    <header>
      <nav class="flex justify-around items-center bg-[#6699CC] p-5 sticky m-5">
        <div class="w-11 h-11">
          <img src="images/phone-logo.avif" alt="logo" class="rounded-md" />
        </div>
        <a href="main.html">
          <div>
            <span class="hidden md:block lg:block font-semibold">Home</span
            ><span class="material-symbols-outlined md:hidden lg:hidden">
              home
            </span>
          </div>
        </a>
        <div>
          <a href="favorites.html"
            ><div>
              <span class="material-symbols-outlined md:hidden lg:hidden">
                favorite
              </span>
              <span class="hidden md:block lg:block font-semibold"
                >Favorites <a href="Favorites.html"></a
              ></span>
            </div>
          </a>
        </div>

        <a href="login.html">
          <div>
            <button
              class="bg-[#DCDCDC] text-black px-4 py-2 rounded-full hover:bg-[#5577AA] hover:text-white transition duration-300 font-bold"
            >
              login
            </button>
          </div>
        </a>
      </nav>
    </header>
    <main>
      <div class="flex items-center bg-white rounded-2xl shadow-md overflow-hidden max-w-md mx-auto border-2 border-[#d0dff0]">
            <span class="material-symbols-outlined text-[#7a99bb] pl-4">search</span>
            <input
              type="text"
              placeholder="Search services..."
              class="flex-1 px-3 py-3 text-sm text-[#1a2a3a] focus:outline-none bg-transparent"
            />
            <button class="bg-[#6699CC] hover:bg-[#5577AA] text-white font-bold text-sm px-5 py-3 transition">
              Search
            </button>
          </div>
      <div id="services-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-4"></div>
        
      </div>
    </main>
    <footer class="mt-auto w-full">
      <div class="justify-center text-center font-medium">
        <p>
          contacts us at
          <a
            href="mailto:info@phonebook.com"
            class="text-blue-500 hover:underline"
            >info@phonebook.com</a
          >
          or call us at
          <a href="tel:+254768023626" class="text-blue-500 hover:underline"
            >+254 768 023 626</a
          >
        </p>
      </div>
      <div class="text-center p-4 bg-[#6699CC] text-white mt-10 rounded-lg">
        &copy; @2026 Phonebook. All rights reserved.
      </div>
    </footer>
  </body>
</html>

<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <title>Emergencies</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
    <script defer src="emergencies.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body class="bg-[#CAE5FF] min-h-screen flex flex-col">
    <header>
      <nav class="flex justify-around items-center bg-[#6699CC] p-5 sticky m-5">
        <div class="w-11 h-11">
          <img src="images/phone-logo.avif" alt="logo" class="rounded-md" />
        </div>
        <a href="main.html">
          <div>
            <span class="hidden md:block lg:block font-semibold">Home</span
            ><span class="material-symbols-outlined md:hidden lg:hidden">
              home
            </span>
          </div>
        </a>
        <div>
          <a href="favorites.html"
            ><div>
              <span class="material-symbols-outlined md:hidden lg:hidden">
                favorite
              </span>
              <span class="hidden md:block lg:block font-semibold"

              login
            </button>
          </div>
        </a>
      </nav>
    </header>
    <main class="flex-1 p-5">
      <div class="flex justify-center items-center h-full">
        <form action="submit" class="rounded-full">
          <input type="text" placeholder="Search..." class="p-2" />
          <button
            type="submit"
            class="bg-[#6699CC] text-white p-2 rounded-md hover:bg-[#5577AA] transition duration-300"
          >
            Search
          </button>
        </form>
      </div>
      <div id="dropdown" class="relative inline-block">
        <button
          id="dropdownBtn"
          class="bg-blue-600 text-white px-4 py-2 rounded-md"
        >
          Country
        </button>
        <div
          class="hidden absolute left-0 mt-2 w-48 bg-white border border-gray-200 rounded-md shadow-lg z-10 max-h-60 overflow-y-scroll"
          id="country-selector"
        ></div>
      </div>
    </main>
    <footer class="mt-auto w-full">
      <div class="justify-center text-center font-medium">
        <p>
          contacts us at
          <a
            href="mailto:info@phonebook.com"
            class="text-blue-500 hover:underline"
            >info@phonebook.com</a

          or call us at
          <a href="tel:+254768023626" class="text-blue-500 hover:underline"
            >+254 768 023 626</a
          >

      <div class="text-center p-4 bg-[#6699CC] text-white mt-10 rounded-lg">
